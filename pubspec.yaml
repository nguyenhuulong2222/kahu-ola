name: kahu_ola
description: "Kahu Ola - Guardian of Life. Real-Time Geospatial Safety Dashboard for Hawaii."
publish_to: 'none'

version: 1.0.0+11

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  cloud_firestore: ^5.6.0

  # UI & Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2810.0
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  http: ^1.6.0

  # Local Storage
  shared_preferences: ^2.3.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.20.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  csv: ^7.1.0
  geocoding: ^4.0.0

  # Lottie for splash animations
  lottie: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.1.5
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/images/logo.png
    - assets/animations/